# governance-ci.yml — 中心 CI 治理模板
#
# 平台管理员将此文件发布到 governance 中心仓库后,
# 各业务仓库在 .gitlab-ci.yml 里一行 include 即可接入所有治理 job:
#
#   include:
#     - project: 'your-group/governance'
#       ref: main
#       file: '/ci/governance-ci.yml'
#
# 可通过 CI/CD Variables 覆盖默认值 (项目设置 → Variables):
#   GOVERNANCE_SOFT_DEADLINE  软门禁截止日期, 如 2026-09-30
#   GOVERNANCE_CONFIG_PATH    governance.config.yml 的仓库内路径
#   GOVERNANCE_REPORT_OUTPUT  周报输出路径, 默认 governance/reports/expired-annotations.md
#   GOVERNANCE_MERGE_BOT_TOKEN  受保护/Masked 的 Merge Bot token, 仅自动合并 job 使用

stages:
  - governance
  - test
  - build
  - merge

# ── 1. 风险扫描: 硬阻断 ──────────────────────────────────────────────────────
governance:risk-scan:
  stage: governance
  image: python:3.11-slim
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
  variables:
    GIT_DEPTH: 0
  before_script:
    - pip install -q pyyaml==6.0.3
  script:
    - |
      TB="${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-$CI_DEFAULT_BRANCH}"
      git fetch -q origin "$TB"
      BASE="origin/$TB"
      CONFIG_ARG=""
      CONFIG_PATH="${GOVERNANCE_CONFIG_PATH:-governance/governance.config.yml}"
      [ -f "$CONFIG_PATH" ] && CONFIG_ARG="--config $CONFIG_PATH"
      python governance/scripts/scan_risks.py --diff-base "$BASE" $CONFIG_ARG
  allow_failure: false

# ── 2. 密钥扫描: 硬阻断 ──────────────────────────────────────────────────────
governance:secret-scan:
  stage: governance
  image:
    name: zricethezav/gitleaks:v8.30.1
    entrypoint: [""]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
  variables:
    GIT_DEPTH: 0
  script:
    - |
      TB="${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-$CI_DEFAULT_BRANCH}"
      git fetch -q origin "$TB"
      BASE="origin/$TB"
      gitleaks detect \
        --source . \
        --log-opts="${BASE}..HEAD" \
        --redact \
        --no-banner \
        --verbose
  allow_failure: false

# ── 3. MR 描述校验: 软→硬 ───────────────────────────────────────────────────
governance:mr-validate:
  stage: governance
  image: python:3.11-slim
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    GIT_DEPTH: 0          # 需完整历史以读取 commit 里的 AI-Usage trailer
  before_script:
    - pip install -q pyyaml==6.0.3
  script:
    - |
      TB="${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-$CI_DEFAULT_BRANCH}"
      git fetch -q origin "$TB"
      BASE="origin/$TB"
      CONFIG_ARG=""
      [ -f "${GOVERNANCE_CONFIG_PATH:-governance/governance.config.yml}" ] \
        && CONFIG_ARG="--config ${GOVERNANCE_CONFIG_PATH:-governance/governance.config.yml}"
      echo "$CI_MERGE_REQUEST_DESCRIPTION" \
        | python governance/scripts/validate_mr.py --diff-base "$BASE" $CONFIG_ARG
  allow_failure: false

# ── 4. 测试痕迹检测: 软→硬 (失败测试记录无条件硬拦) ──────────────────────────
# 改动的生产代码是否做过测试。CI 看不到 .governance/ 证据 (gitignore),
# 退回读 commit 的 Tested: trailer。
governance:test-check:
  stage: governance
  image: python:3.11-slim
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
  variables:
    GIT_DEPTH: 0
  before_script:
    - pip install -q pyyaml==6.0.3
  script:
    - |
      TB="${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-$CI_DEFAULT_BRANCH}"
      git fetch -q origin "$TB"
      BASE="origin/$TB"
      CONFIG_ARG=""
      [ -f "${GOVERNANCE_CONFIG_PATH:-governance/governance.config.yml}" ] \
        && CONFIG_ARG="--config ${GOVERNANCE_CONFIG_PATH:-governance/governance.config.yml}"
      python governance/scripts/check_tested.py --diff-base "$BASE" $CONFIG_ARG
  allow_failure: false

# ── 5. 过期注解周报: 仅报告, 不阻断 ─────────────────────────────────────────
# 每周一 08:00 触发 (需在 GitLab → CI/CD → Schedules 里新建 pipeline 指向此分支)
# 也可在 MR 流水线里手动触发 (when: manual) 随时生成快照。
governance:expired-report:
  stage: governance
  image: python:3.11-slim
  rules:
    # 定时 pipeline
    - if: $CI_PIPELINE_SOURCE == "schedule"
    # 手动触发 (MR 或分支 pipeline 均可)
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true
    - if: $CI_COMMIT_BRANCH
      when: manual
      allow_failure: true
  before_script:
    - pip install -q pyyaml==6.0.3
  script:
    - |
      OUTPUT="${GOVERNANCE_REPORT_OUTPUT:-governance/reports/expired-annotations.md}"
      python governance/scripts/report_expired.py \
        --root . \
        --output "$OUTPUT"
  artifacts:
    paths:
      - governance/reports/
  allow_failure: true

# ── 6. Go 受影响包测试: 硬阻断 (仅 Go 仓库) ─────────────────────────────────
# 前提: 仓库根目录存在 go.mod 且可运行 go test。
# Bazel 单仓需覆盖此 job 或设置 GOVERNANCE_SKIP_GO_TEST=true 跳过。
governance:go-test:
  stage: test
  image: golang:1.22-bookworm
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $GOVERNANCE_SKIP_GO_TEST != "true"
    - if: $CI_COMMIT_BRANCH && $GOVERNANCE_SKIP_GO_TEST != "true"
  variables:
    GIT_DEPTH: 0
    GOFLAGS: "-mod=mod"
  script:
    - |
      # 仓库没有 go.mod 时静默跳过 (非 Go 仓库)
      if [ ! -f go.mod ]; then
        echo "[go-test] 未找到 go.mod, 跳过 Go 测试。"
        exit 0
      fi
      TB="${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-$CI_DEFAULT_BRANCH}"
      git fetch -q origin "$TB"
      BASE="origin/$TB"
      python governance/scripts/run_affected_tests.py \
        --diff-base "$BASE" \
        --timeout "${GOVERNANCE_GO_TEST_TIMEOUT:-120}"
  allow_failure: false

# ── 7. GateResult 决策: 汇总 CI 独立证据, 不直接合并 ─────────────────────────
governance:gate-decision:
  stage: test
  image: python:3.11-slim
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    GIT_DEPTH: 0
  dependencies:
    - governance:risk-scan
    - governance:secret-scan
    - governance:mr-validate
    - governance:test-check
    - governance:go-test
  before_script:
    - pip install -q pyyaml==6.0.3
  script:
    - |
      TB="${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-$CI_DEFAULT_BRANCH}"
      git fetch -q origin "$TB"
      SOURCE_SHA="${CI_MERGE_REQUEST_SOURCE_BRANCH_SHA:-$CI_COMMIT_SHA}"
      TARGET_SHA="${CI_MERGE_REQUEST_TARGET_BRANCH_SHA:-$(git rev-parse "origin/$TB")}"
      CONFIG_PATH="${GOVERNANCE_CONFIG_PATH:-governance.config.yml}"
      [ -f "$CONFIG_PATH" ] || CONFIG_PATH="governance/governance.config.yml"
      POLICY_SHA="$(git rev-parse "${SOURCE_SHA}:${CONFIG_PATH}" 2>/dev/null || echo "$SOURCE_SHA")"
      python - <<'PY' > gate-evidence.json
      import json
      checks = {
          "risk-scan": "pass",
          "secret-scan": "pass",
          "mr-validate": "pass",
          "test-check": "pass",
          "go-test": "pass",
      }
      print(json.dumps({"checks": checks}, ensure_ascii=False))
      PY
      set +e
      python governance/scripts/gate_decision.py \
        --evidence gate-evidence.json \
        --source-sha "$SOURCE_SHA" \
        --target-sha "$TARGET_SHA" \
        --policy-sha "$POLICY_SHA" \
        --diff-base "origin/$TB" \
        --target-branch "$TB" \
        --config "$CONFIG_PATH" \
        --output gate-result.json
      DECISION_EXIT=$?
      set -e
      if [ "$DECISION_EXIT" -gt 1 ]; then
        exit "$DECISION_EXIT"
      fi
  artifacts:
    paths:
      - gate-result.json
    expire_in: 30 days
  allow_failure: false

# ── 8. Merge Bot: 仅消费 GateResult, 使用独立 token 设置 GitLab 自动合并 ─────
governance:auto-merge:
  stage: merge
  image: python:3.11-slim
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  dependencies:
    - governance:gate-decision
  script:
    - |
      python - <<'PY'
      import json
      import os
      import sys
      import urllib.parse
      import urllib.request

      with open("gate-result.json", encoding="utf-8") as f:
          gate = json.load(f)

      action = gate.get("merge_action", "BLOCK")
      result = gate.get("result", "FAIL")
      if action != "AUTO_MERGE":
          print(f"[auto-merge] GateResult={result}, action={action}; skip.")
          raise SystemExit(0)

      if os.getenv("CI_MERGE_REQUEST_SOURCE_PROJECT_ID", os.getenv("CI_PROJECT_ID")) != os.getenv("CI_PROJECT_ID"):
          print("[auto-merge] fork/source-project MR is not eligible for bot merge.")
          raise SystemExit(0)

      token = os.getenv("GOVERNANCE_MERGE_BOT_TOKEN")
      if not token:
          print("[auto-merge] GOVERNANCE_MERGE_BOT_TOKEN is required for GitLab auto merge.", file=sys.stderr)
          raise SystemExit(1)

      api = "{}/projects/{}/merge_requests/{}/merge".format(
          os.environ["CI_API_V4_URL"].rstrip("/"),
          os.environ["CI_PROJECT_ID"],
          os.environ["CI_MERGE_REQUEST_IID"],
      )
      data = urllib.parse.urlencode({
          "merge_when_pipeline_succeeds": "true",
          "squash": "true",
          "should_remove_source_branch": "true",
          "sha": os.getenv("CI_MERGE_REQUEST_SOURCE_BRANCH_SHA", os.getenv("CI_COMMIT_SHA", "")),
      }).encode()
      req = urllib.request.Request(api, data=data, method="PUT", headers={"PRIVATE-TOKEN": token})
      with urllib.request.urlopen(req, timeout=30) as resp:
          print(resp.read().decode("utf-8", errors="replace"))
      PY
  allow_failure: false
