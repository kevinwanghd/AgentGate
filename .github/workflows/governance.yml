# AgentGate 治理门禁 (GitHub Actions 版 — 自举: 本仓库用自己的规范管自己)
#
# 这是把 ci/governance-ci.yml (GitLab CI 语法) 翻译成 GitHub Actions 的版本。
# 本仓库脚本在根级 scripts/, 故调用路径为 scripts/xxx.py (非 governance/scripts/)。
#
# 软门禁(mr-validate / test-check): enforcement:hard, 第一天起即阻断 (新仓库无历史包袱)。
# 硬门禁(risk-scan / secret-scan): 第一天起即阻断。
#
# ┌──────────────────────────────────────────────────────────────┐
# │ 硬约束: 严格只扫 PR 增量 (base..HEAD), 任何情况都不全量扫描。      │
# │ - 只在 pull_request 触发, 用目标分支最新 tip (origin/base.ref) 算 diff。│
# │ - 不在 push 触发 (push 无 base, 会退化成 HEAD~1 等不可控范围)。   │
# │ - 不含 report_expired (它用 os.walk 全树遍历, 只能定时单独跑)。   │
# └──────────────────────────────────────────────────────────────┘
name: governance

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  # 风险扫描: 硬阻断 (命中风险模式且缺合法注解 → 拒合)
  risk-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # 需完整历史以算 diff
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -q pyyaml==6.0.3
      - name: scan risks
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          # 用目标分支最新 tip 作 base (而非 PR 创建时的旧快照 base.sha),
          # 否则 pull/merge 进来的他人改动会被误算进本次 diff。三点 diff 自动取 merge-base。
          if [ -z "$BASE_REF" ]; then echo "::error::PR base.ref 缺失, 拒绝扫描 (不允许全量回退)"; exit 1; fi
          git fetch -q origin "$BASE_REF"
          python scripts/scan_risks.py --diff-base "origin/$BASE_REF" --config governance.config.yml

  # 密钥扫描: 硬阻断
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks (本次 PR 范围)
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          if [ -z "$BASE_REF" ]; then echo "::error::PR base.ref 缺失, 拒绝扫描"; exit 1; fi
          git fetch -q origin "$BASE_REF"
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.30.1 \
            detect --source /repo --log-opts="origin/${BASE_REF}..HEAD" \
            --redact --no-banner --verbose

  # MR 描述校验: 硬门禁 (从 PR body 读 + commit trailer 读 AI-Usage)
  mr-validate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -q pyyaml==6.0.3
      - name: validate PR description
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          if [ -z "$BASE_REF" ]; then echo "::error::PR base.ref 缺失, 拒绝扫描"; exit 1; fi
          git fetch -q origin "$BASE_REF"
          # 如果 PR_BODY 为空，创建临时文件写入提示信息（避免 stdin 为空导致脚本报错）
          if [ -z "$PR_BODY" ]; then
            echo "## 背景" > /tmp/pr_body.txt
            echo "请填写 PR 背景" >> /tmp/pr_body.txt
            echo "" >> /tmp/pr_body.txt
            echo "## 变更内容" >> /tmp/pr_body.txt
            echo "请填写变更内容" >> /tmp/pr_body.txt
            echo "" >> /tmp/pr_body.txt
            echo "## 自测确认" >> /tmp/pr_body.txt
            echo "[ ] 已完成自测" >> /tmp/pr_body.txt
            python scripts/validate_mr.py --diff-base "origin/$BASE_REF" --config governance.config.yml --file /tmp/pr_body.txt
          else
            printf '%s' "$PR_BODY" \
              | python scripts/validate_mr.py --diff-base "origin/$BASE_REF" --config governance.config.yml
          fi

  # 测试痕迹检测: 硬门禁 (失败测试记录无条件硬拦); 读 commit 的 Tested: trailer
  test-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -q pyyaml==6.0.3
      - name: check tested
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          if [ -z "$BASE_REF" ]; then echo "::error::PR base.ref 缺失, 拒绝扫描"; exit 1; fi
          git fetch -q origin "$BASE_REF"
          python scripts/check_tested.py --diff-base "origin/$BASE_REF" --config governance.config.yml

  # Go 受影响包测试 (含反向依赖一跳扩展)
  # 跳过条件: 仓库无 go.mod (非 Go 仓库), 或 vars.GOVERNANCE_SKIP_GO_TEST == "true"
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -q pyyaml==6.0.3
      - name: run affected go tests
        env:
          GOVERNANCE_SKIP_GO_TEST: ${{ vars.GOVERNANCE_SKIP_GO_TEST }}
          GOVERNANCE_GO_TEST_TIMEOUT: ${{ vars.GOVERNANCE_GO_TEST_TIMEOUT }}
        run: |
          if [ "${GOVERNANCE_SKIP_GO_TEST}" = "true" ]; then
            echo "[go-test] GOVERNANCE_SKIP_GO_TEST=true, 跳过。"
            exit 0
          fi
          if [ ! -f go.mod ]; then
            echo "[go-test] 未找到 go.mod, 跳过 Go 测试。"
            exit 0
          fi
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          if [ -z "$BASE_REF" ]; then echo "::error::PR base.ref 缺失, 拒绝扫描"; exit 1; fi
          git fetch -q origin "$BASE_REF"
          python scripts/run_affected_tests.py \
            --diff-base "origin/$BASE_REF" \
            --timeout "${GOVERNANCE_GO_TEST_TIMEOUT:-120}"

  # 自测: 跑 governance 脚本自己的完整回归套件
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -q pyyaml==6.0.3
      - name: run selftest
        run: bash scripts/selftest.sh

  # GateResult 汇总器（只读阶段）。
  # Merge Bot 接入需要独立的 write 权限，待仓库管理员显式启用后再加合并动作。
  gate-decision:
    needs: [risk-scan, secret-scan, mr-validate, test-check, go-test, selftest]
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -q pyyaml==6.0.3
      - name: compute GateResult v2
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git fetch -q origin "$BASE_REF"
          git cat-file -e "$HEAD_SHA^{commit}"
          SOURCE_SHA="$HEAD_SHA"
          POLICY_SHA="$(git rev-parse "${SOURCE_SHA}:governance.config.yml")"
          cat > /tmp/agentgate-evidence.json <<'JSON'
          {"schema_version":"v1","checks":{"risk-scan":"pass","secret-scan":"pass","mr-validate":"pass","test-check":"pass","go-test":"pass","selftest":"pass"}}
          JSON
          python scripts/gate_decision.py \
            --evidence /tmp/agentgate-evidence.json \
            --source-sha "$SOURCE_SHA" \
            --target-sha "$BASE_SHA" \
            --policy-sha "$POLICY_SHA" \
            --diff-base "origin/$BASE_REF" \
            --config governance.config.yml \
            --output gate-result.json
          echo "GateResult:"; cat gate-result.json
