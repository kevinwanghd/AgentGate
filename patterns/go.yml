# Go 专项风险规则包 (mode: warn — 新规则先观察误报率, 不直接硬阻断)
#
# 接入方式: 在消费仓库的 governance.config.yml 中添加:
#
#   risk_annotations:
#     pattern_includes:
#       - governance/patterns/go.yml
#     # pattern_includes 会自动注册下列所有规则类型。
#     # 旧配置如需显式列出，可包含:
#     registered_types:
#       - swallowed-error
#       - context-background
#       - sensitive-log
#       - go-sql-concat
#       - go-hardcoded-secret
#       - go-cmd-inject
#       - go-tls-skip-verify
#       - go-ssrf
#       - go-panic-in-handler
#       - go-weak-random
#
# 所有规则默认 mode: warn (仅警告), 观察几周误报率后可逐条改为 mode: block。

patterns:

  # ── 吞错: _ = err 或空错误处理块 ──────────────────────────────────────────
  - type: swallowed-error
    regex: '\b_\s*=\s*\w[\w.]*\('
    desc: "显式丢弃 error 返回值 (_ = func(...))"
    exts: [".go"]
    mode: warn

  # ── context.Background/TODO 在请求链路中使用 ──────────────────────────────
  - type: context-background
    regex: 'context\.(Background|TODO)\(\)'
    desc: "context.Background()/TODO() 可能截断请求链路的 ctx 传递"
    exts: [".go"]
    mode: warn

  # ── 敏感字段写入日志 ──────────────────────────────────────────────────────
  - type: sensitive-log
    regex: '(?i)\b(?:log|logger|zap|zerolog)\b.*\b(?:password|passwd|token|secret|id_?card|mobile|phone|card_?no|cvv|pin)\b'
    desc: "敏感字段疑似写入日志"
    exts: [".go"]
    mode: warn

  # ── SQL 拼接 ──────────────────────────────────────────────────────────────
  # fmt.Sprintf/+ 拼接 SQL 字符串，应用 ? 占位符或 sqlx.Named
  - type: go-sql-concat
    regex: '(?i)(?:fmt\.Sprintf\s*\(\s*(?:"[^"]{0,220}\b(?:SELECT|INSERT|UPDATE|DELETE|WHERE)\b[^"]{0,220}%[^"]*"|`[^`]{0,220}\b(?:SELECT|INSERT|UPDATE|DELETE|WHERE)\b[^`]{0,220}%[^`]*`)|(?:"[^"]{0,220}\b(?:SELECT|INSERT|UPDATE|DELETE|WHERE)\b[^"]{0,220}"|`[^`]{0,220}\b(?:SELECT|INSERT|UPDATE|DELETE|WHERE)\b[^`]{0,220}`)\s*\+[\s\S]{0,220}|(?:query|sql|stmt)\s*(?::=|=)\s*(?:"[^"]{0,220}\b(?:SELECT|INSERT|UPDATE|DELETE|WHERE)\b[^"]{0,220}"|`[^`]{0,220}\b(?:SELECT|INSERT|UPDATE|DELETE|WHERE)\b[^`]{0,220}`)[\s\S]{0,220}\+)'
    desc: "Go SQL 文本通过 fmt.Sprintf 或字符串拼接构造，建议改用参数化查询"
    exts: [".go"]
    mode: warn

  # ── 硬编码密钥/密码 ──────────────────────────────────────────────────────
  # 字符串变量名含 key/secret/password/token 且直接赋字面量
  - type: go-hardcoded-secret
    regex: '(?i)\b(?:password|passwd|secret|api_?key|access_?key|access_?token|auth_?token|private_?key|client_?secret)\b\s*(?::=|=|:)\s*(?:"[^"\n]{8,}"|`[^`\n]{8,}`)'
    desc: "疑似硬编码密钥，应从环境变量或配置中心读取"
    exts: [".go"]
    mode: warn

  # ── 命令注入: exec.Command 拼接用户输入 ───────────────────────────────────
  - type: go-cmd-inject
    regex: 'exec\.Command\s*\([\s\S]{0,260}\+[\s\S]{0,160}\)'
    desc: "exec.Command 参数含字符串拼接，存在命令注入风险"
    exts: [".go"]
    mode: warn

  # ── 不安全的 HTTP 客户端 (跳过 TLS 验证) ────────────────────────────────
  - type: go-tls-skip-verify
    regex: 'InsecureSkipVerify\s*:\s*true'
    desc: "InsecureSkipVerify:true 跳过 TLS 证书验证，生产环境禁用"
    exts: [".go"]
    mode: warn

  # ── SSRF: url 拼接后直接请求 ─────────────────────────────────────────────
  - type: go-ssrf
    regex: 'http\.(?:Get|Post|Do|NewRequest)\s*\([\s\S]{0,260}\+[\s\S]{0,160}\)'
    desc: "HTTP 请求 URL 含字符串拼接，存在 SSRF 风险；间接数据流仍需后续 AST/污点分析覆盖"
    exts: [".go"]
    mode: warn

  # ── panic 在业务处理函数中 ───────────────────────────────────────────────
  # Handler/Service 层直接 panic 会导致进程崩溃，应返回 error
  - type: go-panic-in-handler
    regex: '\bpanic\s*\('
    desc: "非测试 Go 业务代码中使用 panic，应优先返回 error"
    exts: [".go"]
    mode: warn

  # ── math/rand 用于安全场景 ───────────────────────────────────────────────
  # 伪随机数不适合 token/nonce 生成，应用 crypto/rand
  - type: go-weak-random
    regex: '(?i)(?:(?:token|nonce|password|secret|captcha|otp)[\w\s:=,(){}\[\]."]{0,140}\brand\.(?:Int|Intn|Int31|Int31n|Int63|Int63n|Read|Float32|Float64)\b|\brand\.(?:Int|Intn|Int31|Int31n|Int63|Int63n|Read|Float32|Float64)\b[\w\s:=,(){}\[\]."]{0,140}(?:token|nonce|password|secret|captcha|otp))'
    desc: "math/rand 出现在 token/nonce/验证码等安全生成上下文中，应使用 crypto/rand"
    exts: [".go"]
    mode: warn
