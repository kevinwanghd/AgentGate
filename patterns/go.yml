# Go 专项风险规则包 (mode: warn — 新规则先观察误报率, 不直接硬阻断)
#
# 接入方式: 在消费仓库的 governance.config.yml 中添加:
#
#   risk_annotations:
#     pattern_includes:
#       - governance/patterns/go.yml
#     registered_types:
#       - swallowed-error
#       - context-background
#       - sensitive-log
#
# 所有规则默认 mode: warn (仅警告), 观察几周误报率后可逐条改为 mode: block。

patterns:

  # ── 吞错: _ = err 或空错误处理块 ──────────────────────────────────────────
  # 覆盖: `_ = someFunc()` 显式丢弃 error 返回值
  - type: swallowed-error
    regex: '\b_\s*=\s*\w[\w.]*\('
    desc: "显式丢弃 error 返回值 (_ = func(...))"
    exts: [".go"]
    mode: warn

  # ── context.Background/TODO 在请求链路中使用 ──────────────────────────────
  # 请求处理代码里应透传上游 ctx, 而不是新建根 context
  - type: context-background
    regex: 'context\.(Background|TODO)\(\)'
    desc: "context.Background()/TODO() 可能截断请求链路的 ctx 传递"
    exts: [".go"]
    mode: warn

  # ── 敏感字段写入日志 ──────────────────────────────────────────────────────
  # 匹配 log.Xxx(...) 或 logger.Xxx(...) 行中含敏感字段名
  - type: sensitive-log
    regex: '(?i)\b(?:log|logger|zap|zerolog)\b.*\b(?:password|passwd|token|secret|id_?card|mobile|phone|card_?no|cvv|pin)\b'
    desc: "敏感字段疑似写入日志"
    exts: [".go"]
    mode: warn
